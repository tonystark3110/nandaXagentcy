[program:mbta-slim-planner]
; Planner agent SLIM transport (runs alongside mbta-planner on :50052)
command=/opt/mbta-agents/venv/bin/python /opt/mbta-agents/agents/planner/run_slim.py
directory=/opt/mbta-agents/agents/planner
autostart=true
autorestart=true
startsecs=10
stdout_logfile=/var/log/mbta-slim-planner.out.log
stderr_logfile=/var/log/mbta-slim-planner.err.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=5
environment=
    PYTHONPATH="/opt/mbta-agents",
    AGENT_HOST="96.126.111.107",
    SLIM_LABEL="planner",
    SLIM_ENDPOINT="http://96.126.111.107:46357",
    SLIM_SHARED_SECRET="%(ENV_SLIM_SHARED_SECRET)s",
    SLIM_ORG="mbta",
    SLIM_NS="transit-ci",
    MBTA_API_KEY="%(ENV_MBTA_API_KEY)s",
    OPENAI_API_KEY="%(ENV_OPENAI_API_KEY)s"
